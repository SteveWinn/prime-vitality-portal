[build]
  command = "npm run build"
  publish = "dist/public"

[build.environment]
  # Set this to your Render backend URL after deploying to Render
  # e.g. VITE_API_URL = "https://prime-vitality-portal.onrender.com"
  VITE_API_URL = ""

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
