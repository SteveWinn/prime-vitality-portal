services:
  - type: web
    name: prime-vitality-portal
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_OPTIMIZED
        sync: false
      - key: STRIPE_PRICE_ELITE
        sync: false
      - key: FRONTEND_URL
        sync: false
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
